<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刻度读数与数据记录 - 牛顿环实验</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        .main-container {
            position: absolute;
            left: 0;
            top: 0;
            width: 1200px;
            height: 800px;
            transform-origin: left top;
            display: flex;
            flex-direction: column;
        }
        .content {
            display: flex;
            flex: 1;
            overflow: auto;
        }
        .scale-section {
            flex: 1;
            padding: 15px;
            padding-top: 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
            background-color: #ffffff;
        }
        .canvas-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #scale-canvas {
            width: 100%;
            height: 120px;
            border: 1px solid #ddd;
            background-color: #ffffff;
        }
        #vertical-canvas {
            width: 100%;
            flex: 1;
        }
        .v-canvas-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            border: 1px solid #ddd;
            background-color: #ffffff;
            min-height: 150px;
        }
        .v-canvas-wrapper #vertical-canvas {
            flex: 1;
            border: none;
            min-height: 150px;
        }
        .drum-level-display {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            text-align: center;
            background: rgba(34, 34, 34, 0.85);
            border-radius: 6px;
            padding: 8px 14px;
        }
        .drum-level-value {
            font-family: 'Courier New', monospace;
            font-size: 28px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.4);
        }
        .control-panel {
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
            background-color: #f8f9fa;
            border-top: 1px solid #ddd;
            flex-wrap: wrap;
        }
        .control-button {
            padding: 8px 16px;
            background-color: #3B82F6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 13px;
        }
        .control-button:hover {
            background-color: #2563EB;
            transform: scale(1.05);
        }
        .data-switch {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: 10px;
        }
        .data-switch input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }
        .data-section {
            width: 580px;
            padding: 15px;
            padding-top: 30px;
            background-color: #ffffff;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .data-title {
            font-size: 16px;
            font-weight: bold;
            color: #1E40AF;
            margin-bottom: 10px;
            text-align: center;
        }
        .ring-preview {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }
        .ring-display {
            width: 120px;
            height: 120px;
            background-color: #f0f9ff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .data-table-container {
            overflow-x: auto;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .data-table th,
        .data-table td {
            border: 1px solid #ddd;
            padding: 6px 4px;
            text-align: center;
        }
        .data-table th {
            background-color: #f3f4f6;
            font-weight: 600;
            color: #374151;
        }
        .data-table td {
            background-color: #ffffff;
        }
        .data-table input {
            width: 55px;
            height: 28px;
            padding: 2px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            text-align: center;
            font-size: 12px;
        }
        .data-table input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .current-level {
            background-color: #dbeafe !important;
        }
        .action-panel {
            padding-top: 10px;
            border-top: 1px solid #ddd;
            margin-top: 10px;
        }
        .save-button {
            width: 100%;
            padding: 10px;
            background-color: #10B981;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .save-button:hover {
            background-color: #059669;
        }
        .tip-box {
            margin-top: 10px;
            padding: 8px;
            background-color: #eff6ff;
            border-radius: 5px;
            font-size: 12px;
            color: #1e40af;
        }
        .reading-display {
            text-align: center;
            padding: 8px;
            background-color: #fef3c7;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .reading-value {
            font-weight: bold;
            color: #d97706;
            font-size: 16px;
        }
        /* === 透镜视图嵌入样式 === */
        .lens-embedded-wrapper {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: center;
        }
        .lens-embedded-wrapper .lens-container {
            position: relative;
            width: 450px;
            height: 450px;
            aspect-ratio: 1 / 1;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
        }
        .lens-embedded-wrapper #ringsCanvas {
            position: absolute;
            z-index: 1;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .lens-embedded-wrapper #filterLayer {
            position: absolute;
            z-index: 2;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-color: transparent;
        }
        .lens-embedded-wrapper #coverImg {
            position: absolute;
            z-index: 3;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }
        .lens-embedded-wrapper #eyepieceBtn {
            position: absolute;
            right: 2.5%;
            top: 3.5%;
            width: 12.5%;
            height: 12.5%;
            opacity: 0;
            cursor: pointer;
            background: transparent;
            border: none;
            z-index: 4;
        }
        .lens-embedded-wrapper #eyepieceBtn:hover {
            opacity: 0.2;
            background: rgba(255, 255, 255, 0.5);
        }
        .lens-embedded-wrapper #objectiveBtn {
            position: absolute;
            right: 0%;
            bottom: 1.5%;
            width: 12.5%;
            height: 12.5%;
            cursor: pointer;
            background: transparent;
            border: none;
            z-index: 4;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .lens-embedded-wrapper #objectiveBtn img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .lens-embedded-wrapper #objectiveBtn:hover img {
            opacity: 1;
        }
        .lens-embedded-wrapper #statusPanel {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="content">
            <!-- 左侧刻度区域 -->
            <div class="scale-section">
                <div class="canvas-container">
                    <canvas id="scale-canvas"></canvas>
                    <div class="v-canvas-wrapper">
                        <div class="drum-level-display">
                            <div class="drum-level-value" id="levelDisplay">k=0</div>
                        </div>
                        <canvas id="vertical-canvas"></canvas>
                    </div>
                </div>
                
                <div class="control-panel">
                    <button class="control-button" id="move-to-left-40">左40级</button>
                    <button class="control-button" id="move-left-5">←5级</button>
                    <button class="control-button" id="center">居中</button>
                    <button class="control-button" id="move-right-5">5级→</button>
                    <div class="data-switch">
                        <input type="checkbox" id="data-switch">
                        <label for="data-switch">显示读数</label>
                    </div>
                </div>
            </div>
            
            <!-- 右侧数据记录区域 -->
            <div class="data-section">
                <div class="data-title">实验数据记录</div>


                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>位置</th>
                                <th>40</th>
                                <th>35</th>
                                <th>30</th>
                                <th>25</th>
                                <th>20</th>
                                <th>15</th>
                                <th>10</th>
                                <th>5</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td style="font-weight:500">Left</td>
                                <td><input type="text" data-position="left" data-level="40"></td>
                                <td><input type="text" data-position="left" data-level="35"></td>
                                <td><input type="text" data-position="left" data-level="30"></td>
                                <td><input type="text" data-position="left" data-level="25"></td>
                                <td><input type="text" data-position="left" data-level="20"></td>
                                <td><input type="text" data-position="left" data-level="15"></td>
                                <td><input type="text" data-position="left" data-level="10"></td>
                                <td><input type="text" data-position="left" data-level="5"></td>
                            </tr>
                            <tr>
                                <td style="font-weight:500">Right</td>
                                <td><input type="text" data-position="right" data-level="40"></td>
                                <td><input type="text" data-position="right" data-level="35"></td>
                                <td><input type="text" data-position="right" data-level="30"></td>
                                <td><input type="text" data-position="right" data-level="25"></td>
                                <td><input type="text" data-position="right" data-level="20"></td>
                                <td><input type="text" data-position="right" data-level="15"></td>
                                <td><input type="text" data-position="right" data-level="10"></td>
                                <td><input type="text" data-position="right" data-level="5"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="lens-embedded-wrapper">
                    <div class="lens-container" id="embeddedLens">
                        <canvas id="ringsCanvas" width="500" height="500"></canvas>
                        <div id="filterLayer"></div>
                        <img id="coverImg" src="../img/sim/mj1.png" alt="目镜">
                        <button id="eyepieceBtn" title="调整目镜"></button>
                        <button id="objectiveBtn" title="调节物镜">
                            <img src="../img/sim/wujing.png" alt="物镜">
                        </button>
                        <div id="statusPanel">
                            <div>波长: <span id="lamDisplay">589.3</span> nm</div>
                            <div>亮度: <span id="brightnessDisplay">40</span>%</div>
                        </div>
                    </div>
                </div>

                <div class="action-panel">
                    <button class="save-button" id="save-data">
                        保存到本地文件
                    </button>
                    <div class="tip-box">
                        ⓘ
                        调整刻度到对应级数后，将读数填入表格中。左右两侧分别记录。
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/sim/state.js"></script>
    <script>
        // 全局变量
        let currentLevel = 0;
        let showData = false;
        let scaleCanvas, verticalCanvas;

        // 计算环的半径（从 simState 读取 R 和 lam）
        function calculateRingRadius(k) {
            const factor = Math.abs(k);
            if (factor <= 0) {
                return 0.0;
            }
            const state = simState.getState();
            return Math.sqrt(factor * state.lam * state.R) * 1000;
        }
        
        // 计算当前读数
        function calculateReading() {
            const scaleLengthMm = 50;
            const centerPositionMm = 25;
            const radiusMm = calculateRingRadius(currentLevel);
            const direction = currentLevel < 0 ? -1 : 1;
            const pointerPosition = centerPositionMm + direction * radiusMm;
            const clampedPointerPosition = Math.max(0, Math.min(pointerPosition, scaleLengthMm));
            return clampedPointerPosition.toFixed(3);
        }
        
        // 更新读数显示
        function updateReadingDisplay() {
            const reading = calculateReading();
            // 高亮当前级数对应的输入框
            const absLevel = Math.abs(currentLevel);
            document.querySelectorAll('.data-table input').forEach(input => {
                input.parentElement.classList.remove('current-level');
            });
            
            if (absLevel > 0 && absLevel <= 40 && absLevel % 5 === 0) {
                const position = currentLevel < 0 ? 'left' : 'right';
                const targetInput = document.querySelector(`input[data-position="${position}"][data-level="${absLevel}"]`);
                if (targetInput) {
                    targetInput.parentElement.classList.add('current-level');
                }
            }
        }
        
        // 绘制横向标尺
        function drawScale() {
            const ctx = scaleCanvas.getContext('2d');
            const width = scaleCanvas.width;
            const height = scaleCanvas.height;
            
            ctx.clearRect(0, 0, width, height);
            
            // 标尺参数
            const scaleLengthMm = 50;
            const scaleLengthPixels = width - 40;
            const resolution = 1;
            const centerPositionMm = 25;
            
            // 绘制刻度
            for (let posMm = 0; posMm <= scaleLengthMm; posMm += resolution) {
                const posPixels = 20 + (posMm / scaleLengthMm) * scaleLengthPixels;
                if (posMm % 10 === 0) {
                    ctx.beginPath();
                    ctx.moveTo(posPixels, height - 40);
                    ctx.lineTo(posPixels, height - 20);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    
                    ctx.font = '11px Arial';
                    ctx.fillStyle = '#000';
                    ctx.textAlign = 'center';
                    ctx.fillText(posMm.toString(), posPixels, height - 10);
                } else {
                    ctx.beginPath();
                    ctx.moveTo(posPixels, height - 35);
                    ctx.lineTo(posPixels, height - 25);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
            }
            
            // 计算指针位置
            const radiusMm = calculateRingRadius(currentLevel);
            const direction = currentLevel < 0 ? -1 : 1;
            const pointerPosition = centerPositionMm + direction * radiusMm;
            const clampedPointerPosition = Math.max(0, Math.min(pointerPosition, scaleLengthMm));
            const pointerPixels = 20 + (clampedPointerPosition / scaleLengthMm) * scaleLengthPixels;
            
            // 绘制指针
            ctx.beginPath();
            ctx.moveTo(pointerPixels, height - 43);
            ctx.lineTo(pointerPixels, height - 50);
            ctx.strokeStyle = '#f00';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // 显示读数
            if (showData) {
                ctx.font = '10px Arial';
                ctx.fillStyle = '#f00';
                ctx.textAlign = 'center';
                ctx.fillText(`${clampedPointerPosition.toFixed(3)}mm`, pointerPixels, height - 55);
            }
            
            // 中心参考线
            const centerPixels = 20 + (centerPositionMm / scaleLengthMm) * scaleLengthPixels;
            ctx.beginPath();
            ctx.moveTo(centerPixels, height - 45);
            ctx.lineTo(centerPixels, height - 15);
            ctx.strokeStyle = '#00f';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        // 绘制纵向鼓轮
        function drawVerticalScale() {
            const ctx = verticalCanvas.getContext('2d');
            const width = verticalCanvas.width;
            const height = verticalCanvas.height;
            
            ctx.clearRect(0, 0, width, height);
            
            // 鼓轮参数
            const windowSize = 15;
            const indicatorLine = 7;
            
            // 从横向标尺获取精确的指针位置
            const scaleLengthMm = 50;
            const centerPositionMm = 25;
            const radiusMm = calculateRingRadius(currentLevel);
            const direction = currentLevel < 0 ? -1 : 1;
            const pointerPosition = centerPositionMm + direction * radiusMm;
            const clampedPointerPosition = Math.max(0, Math.min(pointerPosition, scaleLengthMm));
            
            // 计算小数部分
            const decimalPart = clampedPointerPosition - Math.floor(clampedPointerPosition);
            const drumReading = Math.round(decimalPart * 100 * 10) / 10;
            
            // 鼓轮读数：0-99.9，表示0.00-0.99mm
            let baseScale = Math.floor(drumReading);
            const fractional = drumReading - baseScale;
            
            // 修正：四舍五入到1位小数
            let subScale = Math.round(fractional * 10);
            if (subScale >= 10) {
                subScale = 0;
                baseScale = (baseScale + 1) % 100;
            }
            
            // 绘制刻度
            for (let i = 0; i < windowSize; i++) {
                const scaleOffset = i - indicatorLine;
                const reading = (baseScale + scaleOffset + 100) % 100;
                
                // 计算y位置
                const yPos = 20 + (i - fractional) * (height - 40) / windowSize;
                
                // 确保刻度在可视范围内
                if (yPos < 0 || yPos > height) {
                    continue;
                }
                
                // 判断是否是主刻度（10的倍数）
                const isMain = (reading % 10 === 0);
                
                // 绘制刻度线
                if (isMain) {
                    ctx.beginPath();
                    ctx.moveTo(width * 0.35, yPos);
                    ctx.lineTo(width * 0.65, yPos);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    
                    ctx.font = '11px Arial';
                    ctx.fillStyle = '#000';
                    ctx.textAlign = 'left';
                    ctx.fillText(`${reading.toString().padStart(2, '0')}`, width * 0.7, yPos + 4);
                } else {
                    ctx.beginPath();
                    ctx.moveTo(width * 0.4, yPos);
                    ctx.lineTo(width * 0.6, yPos);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
            }
            
            // 绘制指示线（红色）
            const indicatorY = 20 + indicatorLine * (height - 40) / windowSize;
            ctx.beginPath();
            ctx.moveTo(width * 0.3, indicatorY);
            ctx.lineTo(width * 0.7, indicatorY);
            ctx.strokeStyle = '#f00';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            
            // 显示读数
            if (showData) {
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f00';
                ctx.textAlign = 'left';
                ctx.fillText(`${baseScale.toString().padStart(2, '0')}.${subScale}`, width * 0.75, indicatorY + 4);
            }
            
            // 鼓轮标题
            ctx.font = '12px Arial';
            ctx.fillStyle = '#000';
            ctx.textAlign = 'center';
            ctx.fillText('鼓轮读数（0.01mm）', width / 2, 15);
        }
        
        // 更新所有显示
        function updateDisplays(fromRemote) {
            drawScale();
            drawVerticalScale();
            updateReadingDisplay();
            document.getElementById('levelDisplay').textContent = `k=${currentLevel}`;
            if (lensRender) lensRender();
        }
        
        // 初始化Canvas
        function initCanvas() {
            scaleCanvas.width = scaleCanvas.offsetWidth;
            scaleCanvas.height = scaleCanvas.offsetHeight;
            verticalCanvas.width = verticalCanvas.offsetWidth;
            verticalCanvas.height = verticalCanvas.offsetHeight;
            updateDisplays();
        }

        // 等比缩放容器，适配窗口大小
        function resizeContainer() {
            const container = document.querySelector('.main-container');
            const scaleX = window.innerWidth / 1200;
            const scaleY = window.innerHeight / 800;
            const scale = Math.min(scaleX, scaleY);
            const offsetX = 0;
            const offsetY = 0;
            container.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
        }
        
        // 计算偏移量并同步到 simState
        function syncOffset(level) {
            const state = simState.getState();
            const offset = (level < 0 ? -1 : 1) * Math.sqrt(Math.abs(level) * state.lam * state.R);
            simState.setState('currentLevel', level);
            simState.setState('offset', offset);
        }

        // 移动到左40级
        function moveToLeft40() {
            currentLevel = -40;
            syncOffset(currentLevel);
            updateDisplays();
        }

        // 左移5级
        function moveLeft5() {
            currentLevel = Math.max(currentLevel - 5, -simState.getState().maxLevel);
            syncOffset(currentLevel);
            updateDisplays();
        }

        // 居中
        function center() {
            currentLevel = 0;
            syncOffset(currentLevel);
            updateDisplays();
        }

        // 右移5级
        function moveRight5() {
            currentLevel = Math.min(currentLevel + 5, simState.getState().maxLevel);
            syncOffset(currentLevel);
            updateDisplays();
        }
        
        // 切换数据显示
        function toggleDataDisplay() {
            showData = document.getElementById('data-switch').checked;
            updateDisplays();
        }
        
        // 关闭窗口
        function closeWindow() {
            window.close();
        }
        
        // 保存数据到本地
        async function saveData() {
            const levels = [40, 35, 30, 25, 20, 15, 10, 5];
            const leftData = {};
            const rightData = {};

            document.querySelectorAll('.data-table input').forEach(input => {
                const position = input.dataset.position;
                const level = input.dataset.level;
                const value = input.value;
                if (value) {
                    if (position === 'left') leftData[level] = value;
                    else rightData[level] = value;
                }
            });

            // 生成 CSV 内容
            let csv = '位置,' + levels.join(',') + '\n';
            csv += 'Left,' + levels.map(k => leftData[k] || '').join(',') + '\n';
            csv += 'Right,' + levels.map(k => rightData[k] || '').join(',') + '\n';

            if (!window.__TAURI__) {
                // 非 Tauri 环境回退到下载方式
                const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '牛顿环实验数据.csv';
                a.click();
                URL.revokeObjectURL(url);
                return;
            }

            try {
                const { save } = window.__TAURI__.dialog;
                const { writeTextFile } = window.__TAURI__.fs;

                const filePath = await save({
                    defaultPath: '牛顿环实验数据.csv',
                    filters: [{ name: 'CSV', extensions: ['csv'] }]
                });

                if (filePath) {
                    await writeTextFile(filePath, '\uFEFF' + csv);
                    alert('数据已保存到: ' + filePath);
                }
            } catch (error) {
                console.error('保存失败:', error);
                alert('保存失败: ' + error.message);
            }
        }
        
        // 初始化
        window.onload = function() {
            // 获取DOM元素
            scaleCanvas = document.getElementById('scale-canvas');
            verticalCanvas = document.getElementById('vertical-canvas');

            // 从 simState 读取当前级次
            currentLevel = simState.getState().currentLevel;

            resizeContainer();
            initCanvas();
            window.addEventListener('resize', () => {
                resizeContainer();
                initCanvas();
            });

            // 监听其他窗口的状态变更（storage 事件仅跨窗口触发，不会自触发）
            simState.onStateChange((newState) => {
                currentLevel = newState.currentLevel;
                updateDisplays(true);
            });

            // 事件监听器
            document.getElementById('move-to-left-40').addEventListener('click', moveToLeft40);
            document.getElementById('move-left-5').addEventListener('click', moveLeft5);
            document.getElementById('center').addEventListener('click', center);
            document.getElementById('move-right-5').addEventListener('click', moveRight5);
            document.getElementById('data-switch').addEventListener('change', toggleDataDisplay);
            document.getElementById('save-data').addEventListener('click', saveData);
        };
    </script>
    <script>
    // 暴露给外部调用的刷新方法
    var lensRender = null;
    (function() {
        // 配置
        const CANVAS_SIZE = 500;
        const EYEPIECE_IMAGES = ['mj1.png', 'mj2.png', 'mj3.png'];
        const BRIGHTNESS_LEVELS = [0.4, 0.7, 1.0];

        // DOM 元素
        const ringsCanvas = document.getElementById('ringsCanvas');
        const filterLayer = document.getElementById('filterLayer');
        const coverImg = document.getElementById('coverImg');
        const eyepieceBtn = document.getElementById('eyepieceBtn');
        const objectiveBtn = document.getElementById('objectiveBtn');
        const lamDisplay = document.getElementById('lamDisplay');
        const brightnessDisplay = document.getElementById('brightnessDisplay');

        // Canvas 上下文
        const ctx = ringsCanvas.getContext('2d');

        // 当前状态
        let eyepieceIndex = 0;
        let brightnessLevel = 0;
        let isRendering = false;

        // 钠光颜色映射
        function sodiumColormap(intensity) {
            const dark = { r: 147, g: 96, b: 29 };
            const bright = { r: 212, g: 155, b: 55 };
            return {
                r: Math.round(dark.r + (bright.r - dark.r) * intensity),
                g: Math.round(dark.g + (bright.g - dark.g) * intensity),
                b: Math.round(dark.b + (bright.b - dark.b) * intensity)
            };
        }

        // 清空画布
        function clearCanvas() {
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
        }

        // 计算牛顿环
        function renderNewtonRings() {
            if (isRendering) return;
            isRendering = true;

            try {
                if (!simState.canShowRings()) {
                    clearCanvas();
                    isRendering = false;
                    return;
                }

                const state = simState.getState();
                const lam = state.lam;
                const R = state.R;
                const offset = state.offset || 0;

                const levels = 50;
                const ym = Math.sqrt(levels * lam * R);

                const imageData = ctx.createImageData(CANVAS_SIZE, CANVAS_SIZE);
                const data = imageData.data;

                for (let py = 0; py < CANVAS_SIZE; py++) {
                    for (let px = 0; px < CANVAS_SIZE; px++) {
                        const X = ((px / CANVAS_SIZE) * 2 - 1) * ym;
                        const Y = ((py / CANVAS_SIZE) * 2 - 1) * ym;

                        const r = Math.sqrt((X + offset) ** 2 + Y ** 2);

                        const phase = Math.PI * (r * r / R + lam / 2) / lam;
                        const intensity = Math.cos(phase) ** 2;

                        const B = (intensity / 4) * 255;
                        const color = sodiumColormap(B / 255);

                        const idx = (py * CANVAS_SIZE + px) * 4;
                        data[idx] = color.r;
                        data[idx + 1] = color.g;
                        data[idx + 2] = color.b;
                        data[idx + 3] = 255;
                    }
                }

                ctx.putImageData(imageData, 0, 0);
                updateBrightnessFilter();

            } catch (error) {
                console.error('渲染错误:', error);
                clearCanvas();
            } finally {
                isRendering = false;
            }
        }

        // 更新亮度滤镜
        function updateBrightnessFilter() {
            const brightness = BRIGHTNESS_LEVELS[brightnessLevel];
            const opacity = (1 - brightness);

            if (opacity > 0) {
                filterLayer.style.backgroundColor = `rgba(0, 0, 0, ${opacity})`;
            } else {
                filterLayer.style.backgroundColor = 'transparent';
            }

            brightnessDisplay.textContent = Math.round(brightness * 100);
        }

        // 切换目镜图片
        function toggleEyepiece() {
            const newtonPlaced = simState.getStateValue('newtonPlaced');

            eyepieceIndex = (eyepieceIndex + 1) % 3;
            coverImg.src = `../img/sim/${EYEPIECE_IMAGES[eyepieceIndex]}`;
            simState.setState('eyepieceIndex', eyepieceIndex);

            if (eyepieceIndex === 2 && newtonPlaced) {
                simState.updateTaskState(3, true);
            } else {
                simState.updateTaskState(3, false);
                simState.updateTaskState(4, false);
            }

            console.log('目镜图片:', eyepieceIndex + 1);
        }

        // 切换物镜亮度
        function cycleBrightness() {
            const state = simState.getState();
            if (state.taskStates[3] === 0) return;

            brightnessLevel = (brightnessLevel + 1) % 3;
            simState.setState('brightnessLevel', brightnessLevel);
            updateBrightnessFilter();

            if (brightnessLevel === 2) {
                simState.updateTaskState(4, true);
            } else {
                simState.updateTaskState(4, false);
            }

            console.log('亮度级别:', BRIGHTNESS_LEVELS[brightnessLevel] * 100 + '%');
        }

        // 暴露渲染方法给外部
        lensRender = renderNewtonRings;

        // 初始化
        function initLens() {
            const state = simState.getState();
            eyepieceIndex = state.eyepieceIndex || 0;
            brightnessLevel = state.brightnessLevel || 0;

            coverImg.src = `../img/sim/${EYEPIECE_IMAGES[eyepieceIndex]}`;
            lamDisplay.textContent = (state.lam * 1e9).toFixed(0);
            updateBrightnessFilter();

            renderNewtonRings();

            simState.onStateChange((newState) => {
                renderNewtonRings();
                if (newState.eyepieceIndex !== undefined) {
                    eyepieceIndex = newState.eyepieceIndex;
                    coverImg.src = `../img/sim/${EYEPIECE_IMAGES[eyepieceIndex]}`;
                }
                if (newState.brightnessLevel !== undefined) {
                    brightnessLevel = newState.brightnessLevel;
                    updateBrightnessFilter();
                }
            });
        }

        // 事件绑定
        eyepieceBtn.addEventListener('click', toggleEyepiece);
        objectiveBtn.addEventListener('click', cycleBrightness);

        // 初始化
        initLens();
    })();
    </script>
