<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电源控制</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            background-color: #000;
        }
        .power-container {
            position: relative;
            width: 800px;
            height: 450px;
        }
        /* 背景图片 */
        #power-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        /* 透明按钮: (500,300,45,45) */
        #switchBtn {
            position: absolute;
            left: 500px;
            top: 300px;
            width: 45px;
            height: 45px;
            opacity: 0;
            cursor: pointer;
            background: transparent;
            border: none;
        }
        #switchBtn:hover {
            opacity: 0.2;
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="power-container">
        <!-- 背景图片 -->
        <img id="power-img" src="../img/sim/电源-关.webp" alt="电源">

        <!-- 开关按钮 -->
        <button id="switchBtn" title="点击切换电源"></button>
    </div>

    <script src="../js/sim/state.js"></script>
    <script>
        // 图片路径
        const POWER_ON_IMG = '../img/sim/电源-开.webp';
        const POWER_OFF_IMG = '../img/sim/电源-关.webp';

        // DOM 元素
        const powerImg = document.getElementById('power-img');
        const switchBtn = document.getElementById('switchBtn');

        // 初始化
        function init() {
            // 恢复状态
            const isOn = simState.getStateValue('powerOn');
            updateImage(isOn);

            // 监听跨窗口状态变化
            simState.onStateChange((newState) => {
                updateImage(newState.powerOn);
            });
        }

        // 更新图片
        function updateImage(isOn) {
            powerImg.src = isOn ? POWER_ON_IMG : POWER_OFF_IMG;
            document.title = isOn ? '电源控制 - 开启' : '电源控制 - 关闭';
        }

        // 切换电源状态
        function togglePower() {
            const current = simState.getStateValue('powerOn');
            const newValue = !current;

            // 更新状态
            simState.setState('powerOn', newValue);

            // 更新任务状态
            simState.updateTaskState(0, newValue);

            updateImage(newValue);
            console.log('电源状态:', newValue ? '开启' : '关闭');
        }

        // 事件绑定
        switchBtn.addEventListener('click', togglePower);

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
