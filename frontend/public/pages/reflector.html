<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反射镜控制</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            background-color: #000;
        }
        .reflector-container {
            position: relative;
            width: 1422px;
            height: 800px;
        }
        /* 背景图片 */
        #reflector-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        /* 透明按钮: (425,400,50,100) */
        #angleBtn {
            position: absolute;
            left: 425px;
            top: 400px;
            width: 50px;
            height: 100px;
            opacity: 0;
            cursor: pointer;
            background: transparent;
            border: none;
        }
        #angleBtn:hover {
            opacity: 0.2;
            background: rgba(255, 255, 255, 0.5);
        }
        /* 角度状态徽章 */
        #statusBadge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            color: white;
        }
        #statusBadge.correct {
            background-color: #4CAF50;
        }
        #statusBadge.incorrect {
            background-color: #f44336;
        }
    </style>
</head>
<body>
    <div class="reflector-container">
        <!-- 背景图片 -->
        <img id="reflector-img" src="../img/sim/0.webp" alt="反射镜">

        <!-- 角度切换按钮 -->
        <button id="angleBtn" title="点击调整角度"></button>

        <!-- 状态徽章 -->
        <div id="statusBadge" class="incorrect">当前角度: 0°</div>
    </div>

    <script src="../js/sim/state.js"></script>
    <script>
        // 角度状态映射
        // 状态索引：0->0°, 1->45°(正确), 2->90°, 3->135°
        const ANGLE_STATES = [
            { img: '0.webp', angle: 0 },
            { img: '45.webp', angle: 45 },   // 第1次点击，正确角度，右上角变绿
            { img: '90.webp', angle: 90 },
            { img: '135.webp', angle: 135 }   // 第3次点击
        ];

        // DOM 元素
        const reflectorImg = document.getElementById('reflector-img');
        const angleBtn = document.getElementById('angleBtn');
        const statusBadge = document.getElementById('statusBadge');

        // 初始化
        function init() {
            // 恢复状态
            const currentState = simState.getStateValue('reflectorAngle') || 0;
            updateUI(currentState);

            // 监听跨窗口状态变化
            simState.onStateChange((newState) => {
                updateUI(newState.reflectorAngle);
            });
        }

        // 更新界面
        function updateUI(stateIndex) {
            const state = ANGLE_STATES[stateIndex];

            // 更新图片
            reflectorImg.src = `../img/sim/${state.img}`;

            // 更新状态徽章
            statusBadge.textContent = `当前角度: ${state.angle}°`;
            if (state.angle === 45) {
                statusBadge.className = 'correct';
                // 任务1完成（反射镜调至45°）
                simState.updateTaskState(1, true);
            } else {
                statusBadge.className = 'incorrect';
                simState.updateTaskState(1, false);
            }
        }

        // 切换角度
        function toggleAngle() {
            const current = simState.getStateValue('reflectorAngle') || 0;
            const newAngle = (current + 1) % 4;

            // 更新状态
            simState.setState('reflectorAngle', newAngle);

            updateUI(newAngle);
            console.log('反射镜角度:', ANGLE_STATES[newAngle].angle);
        }

        // 事件绑定
        angleBtn.addEventListener('click', toggleAngle);

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
